name: Build TierList.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build TierList.exe
        run: npm run build-win

      - name: Upload TierList.exe
        uses: actions/upload-artifact@v4
        with:
          name: TierList
          path: dist/TierList.exe
          retention-days: 90
